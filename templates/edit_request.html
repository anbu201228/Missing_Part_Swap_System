{% extends 'base.html' %}
{% block content %}

<style>
/* Page background */
.page-wrapper {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

/* Form card */
.form-card {
    background: #ffffff;
    width: 850px;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

/* Title bar */
.form-title {
    font-size: 22px;
    font-weight: bold;
    color: #002b5c;
    margin-bottom: 25px;
    padding-left: 12px;
    border-left: 6px solid #ff4b2b;
}

/* Inputs & selects */
.form-card input,
.form-card select {
    width: 300px;
    padding: 9px;
    margin-bottom: 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* File input */
.form-card input[type="file"] {
    padding: 5px;
}

/* Focus effect */
.form-card input:focus,
.form-card select:focus {
    outline: none;
    border-color: #002b5c;
}

/* Submit button */
.submit-btn {
    margin-top: 20px;
    padding: 10px 28px;
    background-color: #002b5c;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

.submit-btn:hover {
    background-color: #004080;
}

/* Cancel button */
.cancel-btn {
    margin-top: 20px;
    margin-left: 10px;
    padding: 10px 28px;
    background-color: #6c757d;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    text-decoration: none;
}

.cancel-btn:hover {
    background-color: #5a6268;
}
</style>

<div class="page-wrapper">
    <form method="POST" enctype="multipart/form-data" class="form-card">

        <div class="form-title">Edit Request</div>

        <input name="requester_name" placeholder="Requester Name" value="{{ request.requester_name }}" required>

        <select name="project" required>
            <option value="">Select Project</option>
            <option {% if request.project == 'DMRC' %}selected{% endif %}>DMRC</option>
            <option {% if request.project == 'ML4' %}selected{% endif %}>ML4</option>
            <option {% if request.project == 'CMRL PH-2' %}selected{% endif %}>CMRL PH-2</option>
            <option {% if request.project == 'DML3' %}selected{% endif %}>DML3</option>
            <option {% if request.project == 'CMRL-96' %}selected{% endif %}>CMRL-96</option>
        </select>

        <select name="reason" required>
            <option value="">Select Reason</option>
            <option {% if request.reason == 'Missing Part' %}selected{% endif %}>Missing Part</option>
            <option {% if request.reason == 'NCR Part' %}selected{% endif %}>NCR Part</option>
        </select>

        <input name="installation_name" placeholder="Installation Name" value="{{ request.installation_name }}">

        <input name="part_no" placeholder="Part No" value="{{ request.part_no }}">

        <input name="part_name" placeholder="Part Name" value="{{ request.part_name }}">

        <input type="file" name="image">
        {% if request.image %}
        <small class="text-muted">Current image: {{ request.image }} (upload new to replace)</small>
        {% endif %}

        <input name="from_ts" placeholder="From which TS" value="{{ request.from_ts }}">

        <input name="fix_ts" placeholder="Fix in which TS" value="{{ request.fix_ts }}">

        <input type="date" name="date" value="{{ request.date }}" required>

        <select name="status">
            <option value="Pending" {% if request.status == 'Pending' %}selected{% endif %}>Pending</option>
            <option value="Completed" {% if request.status == 'Completed' %}selected{% endif %}>Completed</option>
        </select>

        <button type="submit" class="submit-btn">Update Request</button>
        <a href="/requests" class="cancel-btn">Cancel</a>

    </form>
</div>

{% endblock %}
