<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ALSTOM | Part Swap{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --alstom-navy: #002244;
            --alstom-blue: #4067B1;
            --alstom-red: #E0301E;
        }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Corporate Header */
        .top-navbar {
            background-color: var(--alstom-navy);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-logo { font-weight: 800; font-size: 22px; letter-spacing: 1px; color: white; text-decoration: none; }
        .navbar-logo span { color: var(--alstom-red); }

        /* Dashboard Container */
        .content-area { padding: 40px 0; min-height: 80vh; }
        .glass-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border: none;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="top-navbar">
    <a href="/" class="navbar-logo">ALST<span>O</span>M</a>
    <div class="d-flex gap-3">
        <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        <a href="/requests" class="btn btn-outline-light btn-sm">Database</a>
    </div>
</div>

<div class="container content-area">
    <div class="glass-card">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
